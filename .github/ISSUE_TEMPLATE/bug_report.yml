# Bug Report
name: Bug Report
description: Report a reproducible bug in spanforge
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: spanforge version
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.8"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code to reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (include full traceback)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: e.g. OS, exporter used, integrations installed
