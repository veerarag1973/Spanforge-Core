# Default values for spanforge Helm chart (ENT-022).
replicaCount: 1

image:
  repository: ghcr.io/spanforge/spanforge-core
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8340

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: spanforge.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  SF_ENDPOINT: "http://localhost:8340"
  SF_OFFLINE_MODE: "false"
  SF_SELF_HOSTED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

serviceAccount:
  create: true
  name: ""
  annotations: {}
